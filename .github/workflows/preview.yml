name: Deploy PR Preview to Netlify

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: netlify-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Netlify (Preview)
        id: netlify-preview
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-deploy: false
          deploy-message: "Preview PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          enable-commit-comment: true
          enable-commit-status: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  close-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close Netlify Preview
        uses: nwtgck/actions-netlify@v3.0
        with:
          action: delete
          publish-dir: ./dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
